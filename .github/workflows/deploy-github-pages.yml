# Prerequisites (otherwise deploy-pages often returns 404 on "create deployment"):
# 1) Settings → Pages → Build and deployment → Source → GitHub Actions (not "Deploy from a branch").
# 2) Free GitHub orgs: Pages only from public repos unless the org is on a paid plan — private repo → enable Pages may be blocked.
# 3) Org owners: Settings → Pages (organization) → allow GitHub Pages if disabled for the org.
# 4) This workflow uses actions/configure-pages before upload (same order as GitHub's static Pages template).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Set Vite base and site URL for GitHub Pages
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if [ "$REPO" = "$OWNER.github.io" ]; then
            echo "VITE_BASE=/" >> "$GITHUB_ENV"
            echo "VITE_SITE_URL=https://${OWNER}.github.io" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE=/${REPO}/" >> "$GITHUB_ENV"
            echo "VITE_SITE_URL=https://${OWNER}.github.io/${REPO}" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
