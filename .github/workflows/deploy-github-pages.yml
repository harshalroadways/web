# Publishes ./dist to branch "gh-pages" (builds run from "main" only).
#
# One-time GitHub settings (repo admin):
# Settings → Pages → Build and deployment → Source → Deploy from a branch
# Branch: gh-pages, Folder: / (root)
#
# This avoids actions/deploy-pages, which returns 404 until the "GitHub Actions"
# Pages integration is enabled for the repo/org.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Set VITE_* in the same step as `vite build` so the base path is never lost
      # (otherwise script/css requests go to /assets/... instead of /web/assets/...).
      - name: Build
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if [ "$REPO" = "$OWNER.github.io" ]; then
            export VITE_BASE="/"
            export VITE_SITE_URL="https://${OWNER}.github.io"
          else
            export VITE_BASE="/${REPO}/"
            export VITE_SITE_URL="https://${OWNER}.github.io/${REPO}"
          fi
          npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
