# Builds the app and pushes ./dist to branch "gh-pages".
#
# REQUIRED one-time setup (repo admin) — without this you will keep seeing
# the blank page and /src/main.tsx 404:
#
#   Settings → Pages → Build and deployment → Source: "Deploy from a branch"
#   Branch: gh-pages   Folder: / (root)
#
# Do NOT use Branch: main with Folder: / (root). That publishes the raw repo
# (including index.html that points at /src/main.tsx), not the Vite build.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if [ "$REPO" = "$OWNER.github.io" ]; then
            export VITE_BASE="/"
            export VITE_SITE_URL="https://${OWNER}.github.io"
          else
            export VITE_BASE="/${REPO}/"
            export VITE_SITE_URL="https://${OWNER}.github.io/${REPO}"
          fi
          npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
