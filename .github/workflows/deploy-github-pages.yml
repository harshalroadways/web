# Builds the Vite app and publishes ./dist to the gh-pages branch (repo root).
#
# Match GitHub settings (what you have now):
#   Settings → Pages → Source: Deploy from a branch
#   Branch: gh-pages   Folder: / (root)
#
# Pushes to main/master run this workflow; it does not trigger on gh-pages pushes.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if [ "$REPO" = "$OWNER.github.io" ]; then
            export VITE_BASE="/"
            export VITE_SITE_URL="https://${OWNER}.github.io"
          else
            export VITE_BASE="/${REPO}/"
            export VITE_SITE_URL="https://${OWNER}.github.io/${REPO}"
          fi
          npm run build

      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
