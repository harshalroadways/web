# Builds the Vite app and publishes ./dist via GitHub Pages (Actions).
#
# One-time setup (repo admin):
# Settings → Pages → Build and deployment → Source: GitHub Actions
# (Do NOT use "Deploy from a branch" with the default branch — that serves
# raw source and the browser will request /src/main.tsx, which is not on Pages.)
#
# After the first successful run, open the "github-pages" environment URL.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if [ "$REPO" = "$OWNER.github.io" ]; then
            export VITE_BASE="/"
            export VITE_SITE_URL="https://${OWNER}.github.io"
          else
            export VITE_BASE="/${REPO}/"
            export VITE_SITE_URL="https://${OWNER}.github.io/${REPO}"
          fi
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
